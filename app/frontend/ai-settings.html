<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - PPT HTML Studio</title>
  <script src="/static/app-settings.js"></script>
  <link rel="stylesheet" href="/static/home.css">
  <link rel="stylesheet" href="/static/ai-settings.css">
</head>
<body class="settings-page">
  <aside class="home-sidebar" aria-label="Main navigation">
    <a class="home-brand" href="/">
      <span class="brand-mark"></span>
      <strong data-i18n="productName">PPT HTML Studio</strong>
    </a>
    <nav>
      <a href="/" data-i18n="home">首页</a>
      <a href="/converter.html" data-i18n="converter">PPT 转 HTML</a>
      <a href="/ai-generate.html" data-i18n="quickCreate">快速创建</a>
      <a href="/chat-create.html" data-i18n="chatCreation">对话创作</a>
      <a class="active" href="/settings.html" data-i18n="settings">设置</a>
    </nav>
  </aside>

  <main class="settings-main">
    <section class="settings-hero">
      <span class="eyebrow" data-i18n="settings">设置</span>
      <h1 data-i18n="settingsTitle">设置</h1>
      <p data-i18n="settingsSubtitle">选择界面语言和主题，也可以在同一页配置三个功能共用的 AI。</p>
    </section>

    <section class="settings-card interface-card">
      <div class="settings-section-head">
        <span class="eyebrow compact" data-i18n="interfaceSettings">界面设置</span>
        <p>Theme and language only change the platform interface. Generated PPT content stays unchanged.</p>
      </div>
      <div class="form-grid">
        <label>
          <span data-i18n="themeMode">主题模式</span>
          <select id="globalThemeSelect" data-theme-select>
            <option value="light" data-i18n="lightMode">浅色模式</option>
            <option value="dark" data-i18n="darkMode">深色模式</option>
            <option value="beige" data-i18n="beigeMode">米色模式</option>
          </select>
        </label>
        <label>
          <span data-i18n="language">界面语言</span>
          <select id="globalLanguageSelect" data-language-select>
            <option value="zh" data-i18n="chinese">中文</option>
            <option value="en" data-i18n="english">English</option>
          </select>
        </label>
      </div>
      <p class="status-line ok" id="interfaceStatus"></p>
    </section>

    <form class="settings-card" id="aiSettingsForm">
      <div class="settings-section-head">
        <span class="eyebrow compact" data-i18n="sharedAi">统一 AI 配置</span>
        <p data-i18n="sharedAiDesc">三个功能共用同一份 API 设置，只需要配置一次。</p>
      </div>
      <div class="form-grid">
        <label>
          <span>Provider</span>
          <select id="provider">
            <option value="openai">OpenAI Compatible</option>
            <option value="deepseek">DeepSeek</option>
            <option value="doubao_seed">Doubao Seed</option>
            <option value="custom_ai">Custom AI API</option>
            <option value="workflow">Custom Workflow</option>
            <option value="dify">Dify Workflow</option>
          </select>
        </label>
        <label>
          <span>Model</span>
          <input id="model" type="text" placeholder="gpt-4.1-mini">
        </label>
        <label class="wide">
          <span>API Key</span>
          <input id="apiKey" type="password" autocomplete="off" placeholder="Paste key once, then leave blank">
        </label>
      </div>

      <div class="key-status" id="keyStatus">No saved key yet.</div>

      <details class="advanced-settings">
        <summary>Advanced connection settings</summary>
        <div class="form-grid">
          <label class="wide">
            <span>Endpoint</span>
            <input id="endpoint" type="url" placeholder="https://api.example.com/v1">
          </label>
          <label>
            <span>Timeout seconds</span>
            <input id="timeoutSec" type="number" min="60" max="600" value="300">
          </label>
          <label>
            <span>API key header</span>
            <select id="apiKeyHeader">
              <option value="Authorization">Authorization</option>
              <option value="X-API-Key">X-API-Key</option>
              <option value="api-key">api-key</option>
              <option value="none">No API key header</option>
            </select>
          </label>
          <label>
            <span>API key prefix</span>
            <input id="apiKeyPrefix" type="text" placeholder="Bearer ">
          </label>
          <label>
            <span>Workflow payload</span>
            <select id="workflowPayload">
              <option value="flat">Flat JSON</option>
              <option value="input">{ "input": ... }</option>
              <option value="dify">Dify blocking</option>
            </select>
          </label>
          <label class="wide">
            <span>Advanced headers</span>
            <textarea id="customHeaders" rows="4" placeholder='{"X-Workflow-Token":"..."} or Header-Name: value'></textarea>
          </label>
        </div>
      </details>

      <div class="settings-actions">
        <button class="primary-action" type="submit">Save AI</button>
        <button class="secondary-button" id="testApi" type="button">Test API</button>
        <a class="secondary-button" href="/" data-i18n="backHome">返回主页</a>
      </div>
      <p class="status-line" id="settingsStatus"></p>
    </form>
  </main>

  <script src="/static/ai-config.js"></script>
  <script src="/static/ai-settings.js"></script>
</body>
</html>
